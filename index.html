  .page { max-width: 1100px; margin: 0 auto; padding: 28px 20px 48px; position: relative; }
  .page::before { content: ""; position: fixed; inset: 0; background: rgba(5, 20, 50, 0.55); z-index: 0; pointer-events: none; }
  .page > * { position: relative; z-index: 1; }

  /* Header */
  .page-header { display: flex; align-items: flex-start; justify-content: space-between; margin-bottom: 28px; flex-wrap: wrap; gap: 12px; }
  .page-header h1 { font-size: 26px; font-weight: 800; color: #ffffff; text-shadow: 0 2px 12px rgba(0,80,180,0.7), 0 1px 3px rgba(0,0,0,0.8); letter-spacing: 0.02em; line-height: 1.2; }
  .page-header .meta { font-size: 13px; color: rgba(200,230,255,0.9); margin-top: 4px; }
  .badge-q1 { background: rgba(55,138,221,0.3); color: #A8D4FF; border: 1px solid rgba(100,180,255,0.5); font-size: 12px; font-weight: 600; padding: 4px 12px; border-radius: 20px; white-space: nowrap; align-self: flex-start; margin-top: 4px; }

  /* Tabs */
  .tabs { display: flex; gap: 6px; margin-bottom: 24px; flex-wrap: wrap; }
  .tab { padding: 7px 20px; border-radius: var(--radius); border: 1px solid rgba(120,180,255,0.5); font-size: 13px; font-weight: 600; cursor: pointer; background: rgba(8,35,90,0.75); color: #c8e8ff; transition: all 0.15s; backdrop-filter: blur(6px); }
  .tab.active { background: var(--blue); color: #fff; border-color: var(--blue); }
  .tab:hover:not(.active) { background: rgba(30,80,160,0.6); }

  /* Section title */
  .section-title { font-size: 11px; font-weight: 700; color: #90d8ff; text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 10px; }

  /* Metric cards */
  .metrics-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 10px; margin-bottom: 20px; }
  .metric-card { background: rgba(8,35,90,0.78); border: 1px solid rgba(120,190,255,0.45); border-radius: var(--radius); padding: 14px 16px; backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px); }
  .metric-card .label { font-size: 12px; color: #b8d8ff; margin-bottom: 6px; line-height: 1.3; font-weight: 500; }
  .metric-card .value { font-size: 24px; font-weight: 700; color: #ffffff; line-height: 1; text-shadow: 0 1px 4px rgba(0,0,0,0.4); }
  .metric-card .sub { font-size: 11px; color: #a8d0ff; margin-top: 4px; font-weight: 400; }
  .metric-card.green .value { color: #5fffc0; text-shadow: 0 1px 6px rgba(0,180,100,0.5); }
  .metric-card.amber .value { color: #ffd060; text-shadow: 0 1px 6px rgba(200,130,0,0.5); }
  .metric-card.red .value { color: #ff7070; text-shadow: 0 1px 6px rgba(200,0,0,0.5); }
  .metric-card.blue .value { color: #70c8ff; text-shadow: 0 1px 6px rgba(0,100,220,0.5); }

  /* Chart cards */
  .charts-row { display: grid; grid-template-columns: repeat(2, minmax(0,1fr)); gap: 16px; margin-bottom: 16px; }
  .charts-row3 { display: grid; grid-template-columns: repeat(3, minmax(0,1fr)); gap: 16px; margin-bottom: 16px; }
  .chart-card { background: var(--surface); border: 1px solid rgba(255,255,255,0.4); border-radius: var(--radius-lg); padding: 18px; backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px); }
  .chart-card h3 { font-size: 14px; font-weight: 600; color: #0C447C; margin-bottom: 2px; }
  .chart-card .chart-sub { font-size: 12px; color: var(--text2); margin-bottom: 12px; }
  .chart-full { grid-column: 1 / -1; }

  /* Legend */
  .legend { display: flex; flex-wrap: wrap; gap: 10px; margin-bottom: 10px; font-size: 12px; color: var(--text2); }
  .legend span { display: flex; align-items: center; gap: 5px; }
  .legend-dot { width: 10px; height: 10px; border-radius: 2px; flex-shrink: 0; }

  /* Table */
  .table-card { background: var(--surface); border: 1px solid rgba(255,255,255,0.4); border-radius: var(--radius-lg); padding: 18px; margin-bottom: 16px; backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px); }
  .table-card h3 { font-size: 14px; font-weight: 600; color: var(--text); margin-bottom: 14px; }
  table { width: 100%; border-collapse: collapse; font-size: 13px; }
  th { text-align: left; font-weight: 600; color: #185FA5; font-size: 11px; text-transform: uppercase; letter-spacing: 0.04em; padding: 8px 10px; border-bottom: 1.5px solid rgba(0,80,180,0.2); }
  td { padding: 9px 10px; color: var(--text); border-bottom: 1px solid var(--border); vertical-align: middle; }
  tr:last-child td { border-bottom: none; }
  tr:hover td { background: var(--surface2); }

  /* Badges */
  .badge { display: inline-block; padding: 2px 9px; border-radius: 10px; font-size: 11px; font-weight: 600; }
  .badge-green { background: var(--green-bg); color: var(--green-text); }
  .badge-amber { background: var(--amber-bg); color: var(--amber-text); }
  .badge-red { background: var(--red-bg); color: var(--red-text); }
  .badge-blue { background: var(--blue-bg); color: var(--blue-text); }

  /* Trend */
  .trend { font-size: 12px; font-weight: 600; display: inline-flex; align-items: center; gap: 2px; }
  .trend.up { color: var(--green); }
  .trend.down { color: var(--red); }
  .trend.neu { color: var(--text3); }

  /* Insight box */
  .insights { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px,1fr)); gap: 12px; margin-bottom: 20px; }
  .insight { background: rgba(255,255,255,0.88); border-left: 3px solid var(--blue); border-radius: 0 var(--radius) var(--radius) 0; padding: 12px 16px; border: 1px solid rgba(255,255,255,0.4); border-left-width: 3px; backdrop-filter: blur(6px); }
  .insight.warn { border-left-color: var(--amber); }
  .insight.alert { border-left-color: var(--red); }
  .insight.good { border-left-color: var(--green); }
  .insight .ins-title { font-size: 12px; font-weight: 600; color: var(--text); margin-bottom: 4px; }
  .insight .ins-body { font-size: 12px; color: var(--text2); line-height: 1.5; }

  /* Divider */
  .divider { border: none; border-top: 1px solid var(--border); margin: 24px 0; }

  /* Print */
  @media print {
    body { background: white; }
    .tabs { display: none; }
    #content > * { break-inside: avoid; }
  }

  @media (max-width: 680px) {
    .charts-row, .charts-row3 { grid-template-columns: 1fr; }
    .chart-full { grid-column: 1; }
  }

  /* KPI nuevos propuestos */
  .kpi-table-wrap { background: rgba(255,255,255,0.96); border: 1.5px solid rgba(123,45,139,0.35);
    border-radius: var(--radius-lg); overflow: hidden;
    backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px); margin-bottom: 16px;
    box-shadow: 0 4px 24px rgba(0,0,0,0.18); }
  .kpi-table-header { background: linear-gradient(90deg,#6a1b7a 0%,#9c3bb0 100%); color: #fff;
    text-align: center; font-size: 14px; font-weight: 800; padding: 12px 20px;
    letter-spacing: 0.08em; text-transform: uppercase; }

  .meta-val { color: #1255c0; font-weight: 700; font-size: 13px; }

  .estado-ok   { color: #0a6640; font-weight: 700; font-size: 12px;

    margin-top: 10px; border-top: 1px solid rgba(120,190,255,0.25); padding-top: 8px; }

    backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px); }
  .reag-block h3 { font-size: 14px; font-weight: 700; color: #90d8ff; margin-bottom: 14px;
    display: flex; align-items: center; gap: 8px; }

  .reag-card { background: rgba(255,255,255,0.08); border: 1px solid rgba(120,190,255,0.25);
    border-radius: var(--radius); padding: 12px 14px; text-align: center; }
  .reag-card .rc-label { font-size: 11px; color: #a0c8f0; margin-bottom: 5px; font-weight: 500; }
  .reag-card .rc-val   { font-size: 22px; font-weight: 700; color: #fff; line-height: 1; }
  .reag-card .rc-pct   { font-size: 12px; color: #70c8ff; margin-top: 3px; font-weight: 600; }
  .reag-card.green .rc-val { color: #5fffc0; }
  .reag-card.amber .rc-val { color: #ffd060; }
  .reag-card.blue  .rc-val { color: #70c8ff; }
  .reag-bar-wrap { margin-top: 10px; }
  .reag-bar-label { font-size: 11px; color: #a0c8f0; margin-bottom: 4px; display: flex; justify-content: space-between; }
  .reag-bar-track { height: 8px; background: rgba(255,255,255,0.12); border-radius: 4px; overflow: hidden; display: flex; }
  .reag-bar-seg { height: 100%; }

  /* Menores block inside kpi table */
  .menores-pct { font-size: 11px; color: #555; display: block; margin-top: 2px; }

</style>
</head>
<body>
<div class="page">

<div class="page-header">
  <div>
    <h1>PSP HOME INFUSION CHILE<br>KPI 2026 — PRIMER TRIMESTRE</h1>
    <div class="meta">Serproen · Enero – Marzo 2026 · Enfermedades de Depósito Lisosomal</div>
  </div>
  <div class="badge-q1">Q1 2026</div>
</div>

<div class="tabs">
  <button class="tab active" onclick="setMonth('todos',this)">Comparativa Q1</button>
  <button class="tab" onclick="setMonth('Enero',this)">Enero</button>
  <button class="tab" onclick="setMonth('Febrero',this)">Febrero</button>
  <button class="tab" onclick="setMonth('Marzo',this)">Marzo</button>
</div>

<div id="content"></div>

</div>

<script>
const DATA = {
  Enero: {
    pacientes: 79, nuevos: 2, bajas: 0, enfermeros: 38,
    pxEnf: 2.08, infusiones: 177, sinInfusion: 15, adherencia: 0.9267,
    porPatologia: { Fabry: 93, Gaucher: 26, MPS1: 53, Pompe: 5 },
    porZona: { Norte: 35, Centro: 19, Sur: 25 },
    motivos: { 'Evento Adverso': 3, Vacaciones: 3, 'Control Médico': 1, Otro: 8 },
    medicamento: { Fabrazyme: 51, Cerezyme: 13, Aldurazyme: 12, Myozyme: 3 },
    totalInf: { Fabry: 101, Gaucher: 26, MPS1: 58, Pompe: 7 },
    perdidas: { Fabry: 8, Gaucher: 0, MPS1: 5, Pompe: 2 },
  },
  Febrero: {
    pacientes: 79, nuevos: 0, bajas: 0, enfermeros: 33,
    pxEnf: 2.39, infusiones: 157, sinInfusion: 24, adherencia: 0.8722,
    porPatologia: { Fabry: 88, Gaucher: 23, MPS1: 41, Pompe: 4 },
    porZona: { Norte: 35, Centro: 19, Sur: 25 },
    motivos: { 'Evento Adverso': 3, Vacaciones: 11, 'Control Médico': 1, Otro: 9 },
    medicamento: { Fabrazyme: 51, Cerezyme: 13, Aldurazyme: 12, Myozyme: 3 },
    totalInf: { Fabry: 102, Gaucher: 26, MPS1: 46, Pompe: 6 },
    perdidas: { Fabry: 14, Gaucher: 3, MPS1: 5, Pompe: 2 },
  },
  Marzo: {
    pacientes: 79, nuevos: 0, bajas: 0, enfermeros: 36,
    pxEnf: 2.19, infusiones: 193, sinInfusion: 18, adherencia: 0.9147,
    porPatologia: { Fabry: 115, Gaucher: 28, MPS1: 45, Pompe: 5 },
    porZona: { Norte: 35, Centro: 19, Sur: 25 },
    motivos: { 'Evento Adverso': 4, Vacaciones: 1, 'Control Médico': 2, Otro: 11 },
    medicamento: { Fabrazyme: 51, Cerezyme: 13, Aldurazyme: 12, Myozyme: 3 },
    totalInf: { Fabry: 122, Gaucher: 29, MPS1: 52, Pompe: 8 },
    perdidas: { Fabry: 7, Gaucher: 1, MPS1: 7, Pompe: 3 },
  }
};

const MESES = ['Enero','Febrero','Marzo'];
const COLORS = { Fabry: '#378ADD', Gaucher: '#1D9E75', MPS1: '#D4537E', Pompe: '#EF9F27' };
const ZONE_COLORS = { Norte: '#534AB7', Centro: '#0F6E56', Sur: '#D85A30' };
const MOTIVO_COLORS = ['#E24B4A','#EF9F27','#378ADD','#888780'];
const MOTIVOS = ['Evento Adverso','Vacaciones','Control Médico','Otro'];
const MED_MAP = { Fabry:'Fabrazyme', Gaucher:'Cerezyme', MPS1:'Aldurazyme', Pompe:'Myozyme' };

let charts = [];
let currentMonth = 'todos';

function destroyCharts() { charts.forEach(c => { try { c.destroy(); } catch(e){} }); charts = []; }
function adh(v) { return (v*100).toFixed(1)+'%'; }
function pct(r,t) { return ((r/t)*100).toFixed(0); }

function setMonth(m, btn) {
  currentMonth = m;
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  if(btn) btn.classList.add('active');
  destroyCharts();
  render();
}

Chart.register(ChartDataLabels);

function mkChart(id, config) {
  const c = new Chart(document.getElementById(id), config);
  charts.push(c);
  return c;
}

function legendHtml(items) {
  return items.map(([label,color]) =>
    `<span><span class="legend-dot" style="background:${color}"></span>${label}</span>`
  ).join('');
}

function canvasWrap(id, height, label) {
  return `<div style="position:relative;width:100%;height:${height}px;"><canvas id="${id}" role="img" aria-label="${label}"></canvas></div>`;
}

function render() {
  const el = document.getElementById('content');
  el.innerHTML = '';
  if (currentMonth === 'todos') renderComparativa(el);
  else renderMes(el, currentMonth);
}

function renderMes(el, mes) {
  const d = DATA[mes];
  const pats = ['Fabry','Gaucher','MPS1','Pompe'];
  const realizadas = pats.map(p => d.totalInf[p] - d.perdidas[p]);
  const perdidas_arr = pats.map(p => d.perdidas[p]);
  const adh_class = d.adherencia >= 0.92 ? 'green' : d.adherencia >= 0.87 ? '' : 'red';

  el.innerHTML = `
  <div class="section-title">Resumen del mes — ${mes}</div>
  <div class="metrics-grid">
    <div class="metric-card"><div class="label">Pacientes activos</div><div class="value">${d.pacientes}</div></div>
    <div class="metric-card ${adh_class}"><div class="label">Adherencia estimada</div><div class="value">${adh(d.adherencia)}</div></div>
    <div class="metric-card blue"><div class="label">Total infusiones</div><div class="value">${d.infusiones}</div></div>
    <div class="metric-card ${d.sinInfusion > 20 ? 'amber' : ''}"><div class="label">Sin infusión</div><div class="value">${d.sinInfusion}</div></div>
    <div class="metric-card"><div class="label">Enfermeros activos</div><div class="value">${d.enfermeros}</div></div>
    <div class="metric-card"><div class="label">Px / enfermero</div><div class="value">${d.pxEnf.toFixed(2)}</div></div>
    <div class="metric-card ${d.nuevos > 0 ? 'green' : ''}"><div class="label">Nuevos ingresos</div><div class="value">${d.nuevos}</div></div>
    <div class="metric-card"><div class="label">Bajas</div><div class="value">${d.bajas}</div></div>
    <div class="metric-card blue"><div class="label">Menores de edad</div><div class="value">${REAG_DATA[mes].menores}</div><div class="sub">${REAG_DATA[mes].pct_menores}% del total activo</div></div>
    <div class="metric-card"><div class="label">Adultos</div><div class="value">${REAG_DATA[mes].adultos}</div><div class="sub">${REAG_DATA[mes].pct_adultos}% del total activo</div></div>
  </div>

  <div class="charts-row">
    <div class="chart-card">
      <h3>Infusiones por patología</h3>
      <div class="chart-sub">Realizadas vs. perdidas</div>
      <div class="legend">${legendHtml([['Realizadas','#378ADD'],['Perdidas','#E24B4A']])}</div>
      ${canvasWrap('c1-'+mes, 200, 'Infusiones por patología '+mes)}
    </div>
    <div class="chart-card">
      <h3>Motivos de no infusión</h3>
      <div class="chart-sub">${d.sinInfusion} pacientes sin infundir</div>
      <div class="legend" id="leg-mot-${mes}"></div>
      ${canvasWrap('c2-'+mes, 200, 'Motivos de no infusión '+mes)}
    </div>
  </div>

  <div class="charts-row">
    <div class="chart-card">
      <h3>Distribución por zona geográfica</h3>
      <div class="chart-sub">Total pacientes activos por macrozona</div>
      <div class="legend">${legendHtml(Object.entries(ZONE_COLORS).map(([z,c])=>[`${z} (${d.porZona[z]})`,c]))}</div>
      ${canvasWrap('c3-'+mes, 180, 'Distribución por zona '+mes)}
    </div>
    <div class="chart-card">
      <h3>Pacientes por medicamento</h3>
      <div class="chart-sub">Distribución del universo activo</div>
      <div class="legend">${legendHtml(Object.keys(COLORS).map(p=>[`${p}: ${d.medicamento[MED_MAP[p]]}`,COLORS[p]]))}</div>
      ${canvasWrap('c4-'+mes, 180, 'Pacientes por medicamento '+mes)}
    </div>
  </div>

  <div class="table-card">
    <h3>Detalle de infusiones por patología</h3>
    <table>
      <thead><tr><th>Patología</th><th>Medicamento</th><th>Px activos</th><th>Total programado</th><th>Realizadas</th><th>Perdidas</th><th>% Cumplimiento</th></tr></thead>
      <tbody id="tbl-${mes}"></tbody>
    </table>
  </div>

  <div id="reag-wrap-${mes}"></div>
  <div id="kpi-new-wrap-${mes}"></div>
  <div id="nota-wrap-${mes}"></div>
  `;

  // kpi nuevos propuestos table — inject before motivo legend
  el.querySelector('#reag-wrap-'+mes).innerHTML = buildReagBlock(mes);
  el.querySelector('#kpi-new-wrap-'+mes).innerHTML = buildKpiTable(mes);
  el.querySelector('#nota-wrap-'+mes).innerHTML = buildNotaMetodologica(mes);
  // motivo legend
  document.getElementById('leg-mot-'+mes).innerHTML = legendHtml(MOTIVOS.map((k,i)=>[`${k} (${d.motivos[k]})`,MOTIVO_COLORS[i]]));

  // c1 - barras apiladas
  mkChart('c1-'+mes, {
    type: 'bar',
    data: { labels: pats, datasets: [
      { label:'Realizadas', data: realizadas, backgroundColor:'#378ADD', stack:'s' },
      { label:'Perdidas', data: perdidas_arr, backgroundColor:'#E24B4A', stack:'s' }
    ]},
    options: { responsive:true, maintainAspectRatio:false, plugins:{legend:{display:false}, datalabels:{display:false}},
      scales:{ x:{stacked:true,grid:{display:false}}, y:{stacked:true,grid:{color:'rgba(0,0,0,0.06)'}} } }
  });

  // c2 - donut motivos
  mkChart('c2-'+mes, {
    type:'doughnut',
    data:{ labels:MOTIVOS, datasets:[{ data:MOTIVOS.map(k=>d.motivos[k]), backgroundColor:MOTIVO_COLORS }] },
    options:{ responsive:true, maintainAspectRatio:false, cutout:'65%',
      plugins:{ legend:{display:false},
        datalabels:{ color:'#fff', font:{ weight:'bold', size:12 },
          formatter:(val,ctx) => {
            const total = ctx.chart.data.datasets[0].data.reduce((a,b)=>a+b,0);
            const pct = ((val/total)*100);
            return pct >= 8 ? pct.toFixed(1)+'%' : '';
          }
        }
      }
    }
  });

  // c3 - donut zonas
  mkChart('c3-'+mes, {
    type:'doughnut',
    data:{ labels:Object.keys(d.porZona), datasets:[{ data:Object.values(d.porZona), backgroundColor:Object.values(ZONE_COLORS) }] },
    options:{ responsive:true, maintainAspectRatio:false, cutout:'65%',
      plugins:{ legend:{display:false},
        datalabels:{ color:'#fff', font:{ weight:'bold', size:12 },
          formatter:(val,ctx) => {
            const total = ctx.chart.data.datasets[0].data.reduce((a,b)=>a+b,0);
            const pct = ((val/total)*100);
            return pct >= 8 ? pct.toFixed(1)+'%' : '';
          }
        }
      }
    }
  });

  // c4 - donut medicamentos
  mkChart('c4-'+mes, {
    type:'doughnut',
    data:{ labels:pats.map(p=>MED_MAP[p]), datasets:[{ data:pats.map(p=>d.medicamento[MED_MAP[p]]), backgroundColor:pats.map(p=>COLORS[p]) }] },
    options:{ responsive:true, maintainAspectRatio:false, cutout:'65%',
      plugins:{ legend:{display:false},
        datalabels:{ color:'#fff', font:{ weight:'bold', size:12 },
          formatter:(val,ctx) => {
            const total = ctx.chart.data.datasets[0].data.reduce((a,b)=>a+b,0);
            const pct = ((val/total)*100);
            return pct >= 8 ? pct.toFixed(1)+'%' : '';
          }
        }
      }
    }
  });

  // Tabla
  const tbody = document.getElementById('tbl-'+mes);
  pats.forEach(p => {
    const tot = d.totalInf[p];
    const real = tot - d.perdidas[p];
    const perd = d.perdidas[p];
    const p_pct = pct(real, tot);
    const badge = p_pct >= 90 ? 'badge-green' : p_pct >= 80 ? 'badge-amber' : 'badge-red';
    tbody.innerHTML += `<tr>
      <td><strong>${p}</strong></td>
      <td style="color:var(--text2)">${MED_MAP[p]}</td>
      <td>${d.medicamento[MED_MAP[p]]}</td>
      <td>${tot}</td>
      <td>${real}</td>
      <td>${perd}</td>
      <td><span class="badge ${badge}">${p_pct}%</span></td>
    </tr>`;
  });
}

function renderComparativa(el) {
  const totalQ1 = MESES.reduce((a,m) => a + DATA[m].infusiones, 0);
  const adhProm = MESES.reduce((a,m) => a + DATA[m].adherencia, 0) / 3;
  const pats = ['Fabry','Gaucher','MPS1','Pompe'];

  el.innerHTML = `
  <div class="section-title">Resumen trimestral Q1 2026</div>
  <div class="metrics-grid">
    <div class="metric-card"><div class="label">Pacientes activos</div><div class="value">79</div><div class="sub">Estable todo el trimestre</div></div>
    <div class="metric-card blue"><div class="label">Total infusiones Q1</div><div class="value">${totalQ1}</div></div>
    <div class="metric-card green"><div class="label">Adherencia promedio</div><div class="value">${adh(adhProm)}</div><div class="sub">Mejor en Enero</div></div>
    <div class="metric-card amber"><div class="label">Máx. sin infusión</div><div class="value">24</div><div class="sub">Febrero (verano)</div></div>
    <div class="metric-card"><div class="label">Nuevos ingresos Q1</div><div class="value">2</div><div class="sub">Solo en Enero</div></div>
    <div class="metric-card green"><div class="label">Bajas Q1</div><div class="value">0</div></div>
    <div class="metric-card"><div class="label">Rango enfermeros</div><div class="value">33–38</div><div class="sub">Mín. Febrero</div></div>
    <div class="metric-card"><div class="label">Total Eventos Adversos</div><div class="value">10</div><div class="sub">Q1 acumulado</div></div>
    <div class="metric-card blue"><div class="label">Menores de edad</div><div class="value">20</div><div class="sub">25,3% del total activo</div></div>
    <div class="metric-card"><div class="label">Adultos</div><div class="value">59</div><div class="sub">74,7% del total activo</div></div>
  </div>

  <div class="section-title" style="margin-top:8px">Análisis de hallazgos clave</div>
  <div class="insights">
    <div class="insight good">
      <div class="ins-title">Retención perfecta</div>
      <div class="ins-body">0 bajas en los 3 meses. Los 79 pacientes activos se mantuvieron estables durante todo Q1 2026.</div>
    </div>
    <div class="insight warn">
      <div class="ins-title">Caída en Febrero</div>
      <div class="ins-body">Adherencia bajó a 87.2% con 24 sin infundir. Las vacaciones de verano explicaron 11 de los 24 casos perdidos.</div>
    </div>
    <div class="insight">
      <div class="ins-title">Mejor mes: Marzo</div>
      <div class="ins-body">193 infusiones realizadas, la cifra más alta del trimestre, con recuperación de adherencia al 91.5%.</div>
    </div>
    <div class="insight alert">
      <div class="ins-title">Eventos Adversos crecientes</div>
      <div class="ins-body">3 en Enero, 3 en Febrero, 4 en Marzo. Tendencia al alza que merece seguimiento en Q2.</div>
    </div>
  </div>

  <hr class="divider">

  <div class="charts-row" style="margin-bottom:16px;">
    <div class="chart-card chart-full">
      <h3>Evolución de infusiones por mes y patología</h3>
      <div class="chart-sub">Infusiones realizadas (sin pérdidas), apiladas por patología</div>
      <div class="legend">${legendHtml(pats.map(p=>[p,COLORS[p]]))}</div>
      ${canvasWrap('comp-inf', 240, 'Infusiones mensuales por patología Q1 2026')}
    </div>
  </div>

  <div class="charts-row">
    <div class="chart-card">
      <h3>Adherencia mensual</h3>
      <div class="chart-sub">Porcentaje estimado de adherencia al tratamiento</div>
      ${canvasWrap('comp-adh', 200, 'Adherencia mensual Q1 2026')}
    </div>
    <div class="chart-card">
      <h3>Pacientes sin infundir por mes</h3>
      <div class="chart-sub">Desglose por motivo</div>
      <div class="legend">${legendHtml(MOTIVOS.map((k,i)=>[k,MOTIVO_COLORS[i]]))}</div>
      ${canvasWrap('comp-motivos', 200, 'Motivos de no infusión comparativo Q1 2026')}
    </div>
  </div>

  <div class="charts-row3">
    <div class="chart-card">
      <h3>Infusiones totales por mes</h3>
      <div class="chart-sub">Todas las patologías</div>
      ${canvasWrap('comp-total', 180, 'Total infusiones por mes')}
    </div>
    <div class="chart-card">
      <h3>Carga de enfermeros</h3>
      <div class="chart-sub">Activos y ratio px/enfermero</div>
      ${canvasWrap('comp-enf', 180, 'Enfermeros y carga mensual')}
    </div>
    <div class="chart-card">
      <h3>Eventos Adversos</h3>
      <div class="chart-sub">Casos registrados por mes</div>
      ${canvasWrap('comp-ea', 180, 'Eventos adversos mensuales')}
    </div>
  </div>

  <div class="table-card">
    <h3>Resumen comparativo mensual de KPIs</h3>
    <table>
      <thead><tr><th>Indicador</th><th>Enero</th><th>Febrero</th><th>Marzo</th><th>Variación Q1</th></tr></thead>
      <tbody id="tbl-kpi"></tbody>
    </table>
  </div>

  <div class="table-card">
    <h3>Infusiones por patología — Q1 acumulado</h3>
    <table>
      <thead><tr><th>Patología</th><th>Medicamento</th><th>Px activos</th><th>Total programado</th><th>Realizadas</th><th>Perdidas</th><th>% Cumplimiento</th></tr></thead>
      <tbody id="tbl-q1-pat"></tbody>
    </table>
  </div>
  `;

  // comp-inf: barras apiladas por mes
  mkChart('comp-inf', {
    type:'bar',
    data:{ labels:MESES, datasets: pats.map(p=>({
      label:p,
      data: MESES.map(m => DATA[m].totalInf[p] - DATA[m].perdidas[p]),
      backgroundColor: COLORS[p], stack:'s'
    }))},
    options:{ responsive:true, maintainAspectRatio:false, plugins:{legend:{display:false}},
      scales:{ x:{stacked:true,grid:{display:false}}, y:{stacked:true,grid:{color:'rgba(0,0,0,0.06)'},ticks:{callback:v=>v}} } }
  });

  // comp-adh: linea
  mkChart('comp-adh', {
    type:'line',
    data:{ labels:MESES, datasets:[{
      label:'Adherencia %',
      data: MESES.map(m => +(DATA[m].adherencia*100).toFixed(1)),
      borderColor:'#378ADD', backgroundColor:'rgba(55,138,221,0.12)', fill:true, tension:0.35,
      pointRadius:6, pointBackgroundColor:'#378ADD', pointBorderColor:'#fff', pointBorderWidth:2
    }]},
    options:{ responsive:true, maintainAspectRatio:false, plugins:{legend:{display:false}, datalabels:{display:false}},
      scales:{ x:{grid:{display:false}}, y:{min:82,max:97,ticks:{callback:v=>v+'%'},grid:{color:'rgba(0,0,0,0.06)'}} } }
  });

  // comp-motivos: barras apiladas
  mkChart('comp-motivos', {
    type:'bar',
    data:{ labels:MESES, datasets: MOTIVOS.map((k,i)=>({
      label:k, data:MESES.map(m=>DATA[m].motivos[k]), backgroundColor:MOTIVO_COLORS[i], stack:'s'
    }))},
    options:{ responsive:true, maintainAspectRatio:false, plugins:{legend:{display:false}, datalabels:{display:false}},
      scales:{ x:{stacked:true,grid:{display:false}}, y:{stacked:true,grid:{color:'rgba(0,0,0,0.06)'}} } }
  });

  // comp-total: barras simples
  mkChart('comp-total', {
    type:'bar',
    data:{ labels:MESES, datasets:[{
      label:'Infusiones', data:MESES.map(m=>DATA[m].infusiones),
      backgroundColor:['#378ADD','#E24B4A','#1D9E75']
    }]},
    options:{ responsive:true, maintainAspectRatio:false, plugins:{legend:{display:false}, datalabels:{display:false}},
      scales:{ x:{grid:{display:false}}, y:{grid:{color:'rgba(0,0,0,0.06)'},min:140} } }
  });

  // comp-enf: barra + linea
  mkChart('comp-enf', {
    type:'bar',
    data:{ labels:MESES, datasets:[
      { label:'Enfermeros', type:'bar', data:MESES.map(m=>DATA[m].enfermeros), backgroundColor:'#1D9E75', yAxisID:'y1' },
      { label:'Px/Enf', type:'line', data:MESES.map(m=>DATA[m].pxEnf), borderColor:'#D4537E',

        pointRadius:5, pointBackgroundColor:'#D4537E', pointBorderColor:'#fff', pointBorderWidth:2 }
    ]},
    options:{ responsive:true, maintainAspectRatio:false, plugins:{legend:{display:false}, datalabels:{display:false}},
      scales:{
        y1:{ type:'linear', position:'left', grid:{color:'rgba(0,0,0,0.06)'}, min:28, max:42 },
        y2:{ type:'linear', position:'right', grid:{display:false}, min:1.8, max:2.6 }
      } }
  });

  // comp-ea: barras eventos adversos
  mkChart('comp-ea', {
    type:'bar',
    data:{ labels:MESES, datasets:[{
      label:'Eventos Adversos',
      data:MESES.map(m=>DATA[m].motivos['Evento Adverso']),
      backgroundColor:'#E24B4A'
    }]},
    options:{ responsive:true, maintainAspectRatio:false, plugins:{legend:{display:false}, datalabels:{display:false}},
      scales:{ x:{grid:{display:false}}, y:{grid:{color:'rgba(0,0,0,0.06)'},min:0,ticks:{stepSize:1}} } }
  });

  // Tabla KPI comparativa
  const rows = [
    ['Pacientes activos', m=>DATA[m].pacientes, null],
    ['Infusiones realizadas', m=>DATA[m].infusiones, true],
    ['Sin infusión', m=>DATA[m].sinInfusion, false],
    ['Adherencia', m=>adh(DATA[m].adherencia), true],
    ['Enfermeros activos', m=>DATA[m].enfermeros, null],
    ['Px / enfermero', m=>DATA[m].pxEnf.toFixed(2), null],
    ['Evento Adverso', m=>DATA[m].motivos['Evento Adverso'], false],
    ['Vacaciones', m=>DATA[m].motivos['Vacaciones'], null],
    ['Nuevos ingresos', m=>DATA[m].nuevos, true],
  ];
  const tbody = document.getElementById('tbl-kpi');
  rows.forEach(([label, fn, higher]) => {
    const vals = MESES.map(fn);
    const nums = MESES.map(m => parseFloat(fn(m)));
    const diff = nums[2] - nums[0];
    let cls = 'neu', sym = '—', diffStr = '';
    if(diff > 0.001) {
      cls = higher === true ? 'up' : higher === false ? 'down' : 'neu';
      sym = '▲';
      diffStr = ' ' + (typeof vals[0]==='string' && vals[0].includes('%') ? Math.abs(diff).toFixed(1)+'%' : Math.abs(Math.round(diff)));
    } else if(diff < -0.001) {
      cls = higher === true ? 'down' : higher === false ? 'up' : 'neu';
      sym = '▼';
      diffStr = ' ' + (typeof vals[0]==='string' && vals[0].includes('%') ? Math.abs(diff).toFixed(1)+'%' : Math.abs(Math.round(diff)));
    }
    tbody.innerHTML += `<tr>
      <td style="font-weight:600">${label}</td>
      <td>${vals[0]}</td><td>${vals[1]}</td><td>${vals[2]}</td>
      <td><span class="trend ${cls}">${sym}${diffStr}</span></td>
    </tr>`;
  });

  // Tabla Q1 acumulado por patologia
  const tbody2 = document.getElementById('tbl-q1-pat');
  pats.forEach(p => {
    const tot = MESES.reduce((a,m)=>a+DATA[m].totalInf[p],0);
    const real = MESES.reduce((a,m)=>a+DATA[m].totalInf[p]-DATA[m].perdidas[p],0);
    const perd = MESES.reduce((a,m)=>a+DATA[m].perdidas[p],0);
    const p_pct = pct(real,tot);
    const badge = p_pct>=90?'badge-green':p_pct>=80?'badge-amber':'badge-red';
    const px = DATA['Enero'].medicamento[MED_MAP[p]];
    tbody2.innerHTML += `<tr>
      <td><strong>${p}</strong></td>
      <td style="color:var(--text2)">${MED_MAP[p]}</td>
      <td>${px}</td>
      <td>${tot}</td>
      <td>${real}</td>
      <td>${perd}</td>
      <td><span class="badge ${badge}">${p_pct}%</span></td>
    </tr>`;
  });
}

function estadoHtml(val, meta, lowerBetter, informativo) {
  if (informativo) return '<span class="estado-info">&#9744; Informativo</span>';
  const ok = lowerBetter ? val <= meta : val >= meta;
  const sobre = lowerBetter ? val > meta : val < meta;
  if (ok) return '<span class="estado-ok">&#9989; OK</span>';
  if (lowerBetter) return '<span class="estado-sobre">&#9888;&#65039; Sobre meta</span>';
  return '<span class="estado-bajo">&#9888;&#65039; Bajo meta</span>';
}

function buildKpiTable(mes) {
  const k = KPI_DATA[mes];
  function estadoBadge(val, meta, lowerBetter, informativo) {
    if (informativo) return '<span class="estado-info">&#9744; Informativo</span>';
    const metaN = parseFloat(String(meta).replace(',','.'));
    const valN  = parseFloat(String(val).replace(',','.'));
    const ok = lowerBetter ? valN <= metaN : valN >= metaN;
    if (ok) return '<span class="estado-ok">&#9989; OK</span>';
    return lowerBetter
      ? '<span class="estado-sobre">&#9888;&#65039; Sobre meta</span>'
      : '<span class="estado-bajo">&#9888;&#65039; Bajo meta</span>';
  }
  function row(kpi, val, meta, lower, info) {
    return `<tr>
      <td>${kpi}</td>
      <td><span class="val-num">${val}</span></td>
      <td><span class="meta-val">${meta}</span></td>
      <td>${estadoBadge(val,meta,lower,info)}</td>
    </tr>`;
  }
  const left = [
    row('Tasa de adherencia global',               k.adherencia+'%',             '95,0%',  false, false),
    row('Tasa de p\u00e9rdida de infusi\u00f3n', k.tasa_perdida+'%',           '5,0%',   true,  false),
    row('Carga promedio por enfermero',             k.carga_enf.toFixed(1),       '3,0',    true,  false),
    row('% Pacientes con orden m\u00e9dica',       k.ord_med+'%',                '100,0%', false, false),
  ].join('');
  const right = [
    row('Infusiones perdidas por Ev. Adverso',      k.ea_pct.toFixed(1)+'%',     '10,0%',  true,  false),
    row('% Consentimientos informados',              k.consentimiento+'%',        '100,0%', false, false),
    row('Pacientes sin infusi\u00f3n / total activos', k.sin_inf_pct.toFixed(1)+'%', '10,0%', true, false),
    row('Pacientes menores de edad ('+k.pct_menores+'%)', k.menores+' / 79',      '\u2014', true,  true),
  ].join('');
  const thead = `<thead><tr>
    <th>KPI</th><th>Valor ${mes}</th><th>Meta sugerida</th><th>Estado</th>
  </tr></thead>`;
  return `<div class="kpi-table-wrap">
    <div class="kpi-table-header">KPIs Nuevos Propuestos</div>
    <div class="kpi-body-grid">
      <table class="kpi-new-table">${thead}<tbody>${left}</tbody></table>
      <div class="kpi-divider-col"></div>
      <table class="kpi-new-table">${thead}<tbody>${right}</tbody></table>
    </div>
  </div>`;
}
